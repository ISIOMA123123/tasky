<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Todo Card</title>
   <link rel="stylesheet" href="styles.css">

</head>

<body>

<article data-testid="test-todo-card">

  <!-- Title -->
  <h3 data-testid="test-todo-title" id="title">
    Finish Todo Project
  </h3>

  <!-- Description -->
  <p data-testid="test-todo-description">
    Build a clean, testable todo card with accessibility.
  </p>

  <!-- Priority -->
  <span class="badge high"
        data-testid="test-todo-priority"
        aria-label="High priority">
    High
  </span>

  <!-- Status -->
  <p data-testid="test-todo-status" id="status">
    Pending
  </p>

  <!-- Due Date -->
  <p>
    <time data-testid="test-todo-due-date" id="dueDate"></time>
  </p>

  <!-- Time Remaining -->
  <p data-testid="test-todo-time-remaining"
     id="timeRemaining"
     aria-live="polite">
  </p>

  <!-- Checkbox -->
  <label>
    <input type="checkbox"
           id="checkbox"
           data-testid="test-todo-complete-toggle">
    Mark as complete
  </label>

  <!-- Tags -->
  <ul class="tags" data-testid="test-todo-tags" role="list">
    <li data-testid="test-todo-tag-work">work</li>
    <li data-testid="test-todo-tag-urgent">urgent</li>
  </ul>

  <!-- Buttons -->
  <button data-testid="test-todo-edit-button">Edit</button>
  <button data-testid="test-todo-delete-button">Delete</button>

</article>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device" initial-scale="1.0">
    <title>Todo Card</title>
   </head>
   
   <body>
      <article data-testid="test-to-do-card">
         <h3 data-testid="test-to-do-title">
            TO DO CARD
         </h3>

         <p data-testid="test-todo-description">
            include your task
         </p>
      </article>

      <span data-testid="test-todo-priority">High</span>

      <p data-testid="test-todo-status">Pending</p>

      <p>
         <time data-testid="test-todo-due-date" id="dueDate"></time>
      </p>

      <p data-testid="test-todo-time-remaining" id="timeRemaining"></p>

      <label for="">
         <input 
            type="checkbox"
            data-testid="test-todo-complete-toggle"
            id="checkbox">
         Mark as complete
      </label>

      <ul data-testid="test-todo-tags">
         <li data-testid="test-todo-tag-work">work</li>
         <li data-testid="test-todo-tag-urgent">urgent</li>
      </ul>

      <button data-testid="test-todo-edit-button">Edit</button>
      <button data-testid="test-todo-delete-button">Delete</button>

      <script src=""></script>
   </body>
</html>

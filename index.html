<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Card</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- INPUT SECTION -->
    <div class="form">
    <input type="text" id="taskInput" placeholder="Enter task">

    <textarea name="" id="descriptionInput" data-testid="test-todo-edit-description-input"></textarea>

    <select id="priorityInput">
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
    </select>

    <input type="date" id="dateInput">

    <button onclick="addTask()">Add Task</button>

    <!--Cancel task-->
    <button onclick="cancelTask()" data-testid="test-todo-cancelTask"> Cancel </button>
    </div>

    <!-- TODO CARD -->
    <article data-testid="test-todo-card">

    <h3 data-testid="test-todo-title" id="title">
        Click on edit to add a task
    </h3>

    <p data-testid="test-todo-description" id="description">
        The description of your task will appear here
    </p>

    <span class="badge high"
            data-testid="test-todo-priority"
            id="priority">
        High
    </span>

    <p data-testid="test-todo-status" id="status">
        Pending
    </p>

    <p>
        <time data-testid="test-todo-due-date" id="dueDate"></time>
    </p>

    <p data-testid="test-todo-time-remaining"
        id="timeRemaining"
        aria-live="polite">
    </p>

    <label>
        <input type="checkbox"
            id="checkbox"
            data-testid="test-todo-complete-toggle">
        Mark as complete
    </label>

    <ul class="tags" data-testid="test-todo-tags">
        <li data-testid="test-todo-tag-work">work</li>
        <li data-testid="test-todo-tag-urgent">urgent</li>
    </ul>

    <button data-testid="test-todo-edit-button">Edit</button>
    <button data-testid="test-todo-delete-button">Delete</button>

    </article>

    <script src="script.js"></script>

</body>
</html>
